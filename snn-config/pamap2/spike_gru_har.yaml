dataset:
  name: PAMAP2
  data_root: ./datasets
  subject_independent_split: true
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  pamap2:
    subjects:
    - 101
    - 102
    - 103
    - 104
    - 105
    - 106
    - 107
    - 108
    - 109
    protocol_type: Protocol
    activities:
    - 1
    - 2
    - 3
    - 4
    - 5
    - 6
    - 7
    - 12
    - 13
    - 16
    - 17
    - 24
    window_size: 200
    window_stride: 100
    imu_position: all
    sensor_type: acc_gyro
    normalize: true
device:
  cuda: true
  distributed: false
  gpu_ids:
  - 0
project:
  name: SNN_IMU_PAMAP2_SpikeGRUHAR
  exp_dir: ./logs-Subject-Independent
  checkpoint_dir: ./logs-Subject-Independent/checkpoints/SNN_IMU_PAMAP2_SpikeGRUHAR
  log_file: ./logs-Subject-Independent/SNN_IMU_PAMAP2_SpikeGRUHAR_training.log
  seed: 42
model:
  type: spike_gru_har
  model_file: snn-model/seqsnn_har_models.py
  model_class: SpikeGRUHAR
  num_classes: 12
  input_channels: 6
  hidden_dim: 96
  num_layers: 1
  drop_rate: 0.1
  v_threshold: 1.0
training:
  batch_size: 64
  num_epochs: 100
  num_workers: 8
  pin_memory: true
  print_freq: 100
  eval_freq: 5
  run_final_test: true
  model_selection: accuracy  # accuracy | macro_f1
  save_freq: 10
  clip_grad: 1.0
  amp: false
  loss:
    name: cross_entropy
    label_smoothing: 0.1
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
    momentum: 0.9
  scheduler:
    name: cosine
    min_lr: 1.0e-06
    warmup_epochs: 20
    warmup_lr: 1e-6
    step_size: 50
    gamma: 0.1
testing:
  batch_size: 64
  num_workers: 8
  checkpoint: ''
  output_dir: ./logs-Subject-Independent/results
  save_predictions: false
