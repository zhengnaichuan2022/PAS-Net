dataset:
  name: TNDA
  data_root: ./datasets
  subject_independent_split: true
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  tnda:
    subjects:
    - 1
    - 2
    - 3
    - 4
    - 5
