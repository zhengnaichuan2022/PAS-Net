dataset:
  name: Opportunity
  data_root: ./datasets
  subject_independent_split: true
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  opportunity:
    relative_root: OpportunityUCIDataset/dataset
    split_mode: subject_independent
    label_task: locomotion
    sensor_preset: uci_s123
    pad_to_reference_channels: true
    window_size: 60
    window_stride: 30
    normalize: true
    missing_fill: ffill
device:
  cuda: true
  distributed: false
  gpu_ids:
  - 0
project:
  name: SNN_IMU_Opportunity_SpikeTemporalConvNet2DHAR
  exp_dir: ./logs-Subject-Independent
  checkpoint_dir: ./logs-Subject-Independent/checkpoints/SNN_IMU_Opportunity_SpikeTemporalConvNet2DHAR
  log_file: ./logs-Subject-Independent/SNN_IMU_Opportunity_SpikeTemporalConvNet2DHAR_training.log
  seed: 42
model:
  type: spike_tcn2d_har
  model_file: snn-model/seqsnn_har_models.py
  model_class: SpikeTemporalConvNet2DHAR
  num_classes: 4
  input_channels: 114
  num_imus: 1
  hidden_dim: 32
  num_levels: 3
  kernel_size: 3
  dilation_base: 2
  drop_rate: 0.1
  v_threshold: 1.0
training:
  batch_size: 64
  num_epochs: 100
  num_workers: 8
  pin_memory: true
  print_freq: 100
  eval_freq: 5
  run_final_test: true
  model_selection: accuracy  # accuracy | macro_f1
  save_freq: 10
  clip_grad: 1.0
  amp: false
  loss:
    name: cross_entropy
    label_smoothing: 0.1
  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.01
    momentum: 0.9
  scheduler:
    name: cosine
    min_lr: 1.0e-06
    warmup_epochs: 20
    warmup_lr: 1e-6
    step_size: 50
    gamma: 0.1
testing:
  batch_size: 64
  num_workers: 8
  checkpoint: ''
  output_dir: ./logs-Subject-Independent/results
  save_predictions: false
